name: Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write # allowed to push to the repository (tags, releases, commits)
  issues: write # allowed to comment on released issues
  pull-requests: write # allowed to comment on released PRs

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required for semantic-release to analyze history

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 23
          extra_plugins: |
            @semantic-release/changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request for release changes
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore(release): update changelog'
          branch: release-changes
          title: 'Release: Update Changelog'
          body: 'Automated release PR with CHANGELOG.md updates.'
          base: main

  build:
    name: Build Binaries (${{ matrix.os }})
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            engine_archive: khora-engine-windows-x86_64.zip
            hub_archive: khora-hub-windows-x86_64.zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            engine_archive: khora-engine-linux-x86_64.tar.gz
            hub_archive: khora-hub-linux-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            engine_archive: khora-engine-macos-aarch64.tar.gz
            hub_archive: khora-hub-macos-aarch64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libssl-dev \
            pkg-config

      - name: Build engine binary
        run: cargo build --release -p khora-editor

      - name: Build hub binary
        run: cargo build --release -p khora-hub

      # ── Stage engine payload (binary + bundled assets) ─────────────
      # The editor looks up runtime assets (Geist + Lucide fonts, etc.) under
      # `<exe-dir>/assets/` first; we MUST ship that directory next to the
      # binary or the editor panics on first paint when a downloaded build
      # tries to resolve `FontFamily::Name("icons")`.
      - name: Stage engine payload (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path stage/engine | Out-Null
          Copy-Item target/release/khora-editor.exe stage/engine/
          if (Test-Path crates/khora-editor/assets) {
            Copy-Item crates/khora-editor/assets stage/engine/assets -Recurse
          }

      - name: Stage engine payload (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p stage/engine
          cp target/release/khora-editor stage/engine/
          if [ -d crates/khora-editor/assets ]; then
            cp -R crates/khora-editor/assets stage/engine/assets
          fi

      # ── Stage hub payload (binary + assets) ────────────────────────
      - name: Stage hub payload (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path stage/hub | Out-Null
          Copy-Item target/release/khora-hub.exe stage/hub/
          if (Test-Path hub/assets) {
            Copy-Item hub/assets stage/hub/assets -Recurse
          }

      - name: Stage hub payload (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p stage/hub
          cp target/release/khora-hub stage/hub/
          if [ -d hub/assets ]; then
            cp -R hub/assets stage/hub/assets
          fi

      # ── Package archives ───────────────────────────────────────────
      - name: Package archives (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path stage/engine/* -DestinationPath ${{ matrix.engine_archive }}
          Compress-Archive -Path stage/hub/*    -DestinationPath ${{ matrix.hub_archive }}

      - name: Package archives (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar czf ${{ matrix.engine_archive }} -C stage/engine .
          tar czf ${{ matrix.hub_archive }}    -C stage/hub    .

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.new_release_version }}
          files: |
            ${{ matrix.engine_archive }}
            ${{ matrix.hub_archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
